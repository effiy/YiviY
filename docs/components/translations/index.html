<template id="translations-template">
    <section id="translations">
        <!-- Language Switcher -->
        <div class="lang-switcher" role="tablist" aria-label="Language">
            <button v-for="lang in available"
                    :key="lang.code"
                    class="lang-btn"
                    :class="{ active: lang.code === currentLang }"
                    @click="setLanguage(lang.code)"
                    role="tab"
                    :aria-selected="lang.code === currentLang">
                <span class="lang-emoji">{{ lang.emoji }}</span>
                <span class="lang-label">{{ lang.native }}</span>
            </button>
        </div>

        <!-- ── Hero ──────────────────────────────────────── -->
        <header class="readme-hero">
            <h1>{{ langContent.hero.title }}</h1>
            <a :href="constants.social.trendshift" target="_blank">
                <img :src="constants.social.trendshift" alt="trendshift" class="trendshift-badge">
            </a>
        </header>

        <!-- ── Overview ──────────────────────────────────── -->
        <h2>{{ langContent.overview.title }} (<a :href="langContent.overview.ctaHref" target="_blank">{{ langContent.overview.cta }}</a>)</h2>
        <p class="intro-lead">{{ langContent.overview.lead }}</p>
        <ul class="feature-list">
            <li v-for="(feat, fIdx) in langContent.overview.features" :key="fIdx" v-html="feat.html"></li>
        </ul>
        <p class="tagline" v-html="langContent.overview.tagline.html"></p>

        <!-- ── Demo ──────────────────────────────────────── -->
        <h2>{{ langContent.demo.title }}</h2>
        <div class="demo-grid">
            <div v-for="video in demoVideos" :key="video.id" class="demo-cell">
                <h4>{{ langContent.demo.items[video.id] }}</h4>
                <video :src="video.url" controls preload="metadata"></video>
            </div>
        </div>

        <!-- ── Language Support ──────────────────────────── -->
        <h3>Language Support</h3>
        <p v-html="langContent.languages.inputTitle.html"></p>
        <div class="lang-grid">
            <span v-for="lang in langContent.languages.inputLangs" :key="lang.flag" class="lang-pill">
                {{ lang.flag }} {{ lang.name }} {{ lang.rating }}
            </span>
        </div>
        <p class="callout-text" v-html="langContent.languages.inputNote.html"></p>
        <p><strong>{{ langContent.languages.outputNote }}</strong></p>

        <!-- ── Installation ──────────────────────────────── -->
        <h2>{{ langContent.install.title }}</h2>
        <p v-html="langContent.install.helpNote.html"></p>

        <div class="callout callout-warning">
            <p><strong>{{ langContent.install.cuda.label }}</strong> {{ langContent.install.cuda.intro }}</p>
            <ol class="callout-list">
                <li v-for="(step, sIdx) in langContent.install.cuda.steps" :key="sIdx" v-html="step.html"></li>
            </ol>
        </div>

        <div class="callout callout-warning">
            <p><strong>{{ langContent.install.ffmpeg.label }}</strong> {{ langContent.install.ffmpeg.intro }}</p>
            <ul class="callout-list">
                <li v-for="(inst, iIdx) in langContent.install.ffmpeg.installs" :key="iIdx">
                    <strong>{{ inst.platform }}:</strong> <code>{{ inst.command }}</code>
                    <span v-if="inst.via"> ({{ inst.via }})</span>
                </li>
            </ul>
        </div>

        <!-- ── Method: uv (Recommended) ──────────────────── -->
        <h3>{{ langContent.methods.uv.title }}</h3>
        <p v-html="langContent.methods.uv.intro.html"></p>
        <ol class="install-steps">
            <li v-for="(step, sIdx) in langContent.methods.uv.steps" :key="sIdx">
                <p>{{ step.desc }}</p>
                <pre><code>{{ step.command }}</code></pre>
            </li>
        </ol>
        <p class="alt-note">{{ langContent.methods.uv.alt }}</p>

        <!-- ── Method: Conda ─────────────────────────────── -->
        <h3>{{ langContent.methods.conda.title }}</h3>
        <div class="callout callout-warning">
            <p v-html="langContent.methods.conda.warning.html"></p>
        </div>
        <details>
            <summary>{{ langContent.methods.conda.summary }}</summary>
            <ol class="install-steps">
                <li v-for="(step, sIdx) in langContent.methods.conda.steps" :key="sIdx">
                    <p>{{ step.desc }}</p>
                    <pre><code>{{ step.command }}</code></pre>
                </li>
            </ol>
        </details>

        <!-- ── Docker ────────────────────────────────────── -->
        <h3>{{ langContent.methods.docker.title }}</h3>
        <p>{{ langContent.methods.docker.intro }}</p>
        <pre><code>{{ langContent.methods.docker.commands.join('\n') }}</code></pre>

        <!-- ── API ───────────────────────────────────────── -->
        <h2>{{ langContent.api.title }}</h2>
        <p>{{ langContent.api.intro }}</p>
        <ul class="api-list">
            <li><strong>{{ langContent.api.llmLabel }}:</strong> <span v-html="langContent.api.llm.html"></span></li>
            <li><strong>{{ langContent.api.whisperLabel }}:</strong> {{ langContent.api.whisper }}</li>
            <li><strong>{{ langContent.api.ttsLabel }}:</strong> <span v-html="langContent.api.tts.html"></span></li>
        </ul>
        <div class="callout callout-success">
            <p v-html="langContent.api.note.html"></p>
        </div>

        <!-- ── Limitations ──────────────────────────────── -->
        <h2>{{ langContent.limitations.title }}</h2>
        <ol class="limitations-list">
            <li v-for="(item, iIdx) in langContent.limitations.items" :key="iIdx" v-html="item.html"></li>
        </ol>

        <!-- ── License ──────────────────────────────────── -->
        <h2>{{ langContent.license.title }}</h2>
        <p>{{ langContent.license.content }}</p>
        <p>
            <template v-for="(proj, pIdx) in constants.thanks" :key="proj.name">
                <a :href="proj.url" target="_blank">{{ proj.name }}</a><span v-if="pIdx < constants.thanks.length - 1">, </span>
            </template>
        </p>

        <!-- ── Contact ──────────────────────────────────── -->
        <h2>{{ langContent.contact.title }}</h2>
        <ul class="contact-list">
            <li v-for="(ch, cIdx) in langContent.contact.channels" :key="cIdx" v-html="ch.html"></li>
        </ul>

    </section>
</template>

<script src="data.js"></script>
<script src="index.js"></script>
