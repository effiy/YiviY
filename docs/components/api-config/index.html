<template id="api-config-template">
    <section id="api-config">
        <h2>{{ title }}</h2>
        <p>VideoLingo uses OpenAI-compatible APIs. You can use any provider that supports <code>/v1/chat/completions</code>.</p>

        <!-- ── API Overview ───────────────────────────────── -->
        <h3>{{ api.title }}</h3>
        <p>{{ api.intro }}</p>
        <ul class="api-list">
            <li><strong>{{ api.llmLabel }}:</strong> <span v-html="api.llm.html"></span></li>
            <li><strong>{{ api.whisperLabel }}:</strong> {{ api.whisper }}</li>
            <li><strong>{{ api.ttsLabel }}:</strong> <span v-html="api.tts.html"></span></li>
        </ul>
        <div class="callout callout-success">
            <p v-html="api.note.html"></p>
        </div>

        <h3>Recommended Models</h3>
        <table>
            <tr><th>Quality Tier</th><th>Models</th></tr>
            <tr v-for="row in recommendedModels" :key="row.tier">
                <td>{{ row.tier }}</td>
                <td><code>{{ row.models }}</code></td>
            </tr>
        </table>
        <h3>One-Key Providers</h3>
        <div class="card" v-for="p in providers" :key="p.name">
            <h4>{{ p.name }}</h4>
            <p>{{ p.desc }} <a :href="p.link.href" target="_blank">{{ p.link.label }}</a></p>
            <p v-if="p.detail" v-html="p.detail"></p>
            <pre v-if="p.code"><code>{{ p.code }}</code></pre>
        </div>
    </section>
</template>

<script src="data.js"></script>
<script src="index.js"></script>
