<template id="config-template">
    <section id="config">
        <h2>config.yaml Reference</h2>
        <p>Complete reference for every setting in <code>config.yaml</code>. Settings can be changed via the Streamlit sidebar or by editing the file directly.</p>
        <h3>Basic Settings</h3>
        <table>
            <tr><th>Key</th><th>Type</th><th>Default</th><th>Description</th></tr>
            <tr v-for="row in basicSettings" :key="row.key">
                <td><code>{{ row.key }}</code></td>
                <td>{{ row.type }}</td>
                <td>{{ row.default }}</td>
                <td><span v-html="row.desc"></span></td>
            </tr>
        </table>
        <h3>Advanced Settings</h3>
        <table>
            <tr><th>Key</th><th>Type</th><th>Default</th><th>Description</th></tr>
            <tr v-for="row in advancedSettings" :key="row.key">
                <td><code>{{ row.key }}</code></td>
                <td>{{ row.type }}</td>
                <td>{{ row.default }}</td>
                <td>{{ row.desc }}</td>
            </tr>
        </table>
    </section>
</template>

<script src="data.js"></script>
<script src="index.js"></script>
