<template id="translation-template">
    <section id="translation">
        <h2>Translation Pipeline</h2>
        <p>VideoLingo's translation is a <strong>3-phase</strong> process designed to produce cinematic-quality subtitles.</p>
        <template v-for="phase in phases" :key="phase.title">
            <h3>{{ phase.title }}</h3>
            <p v-html="phase.body"></p>
        </template>
        <h3>Key Configuration</h3>
        <table>
            <tr><th>Setting</th><th>Default</th><th>Effect</th></tr>
            <tr v-for="row in settings" :key="row.key">
                <td><code>{{ row.key }}</code></td>
                <td>{{ row.defaultValue }}</td>
                <td>{{ row.effect }}</td>
            </tr>
        </table>
    </section>
</template>

<script src="data.js"></script>
<script src="index.js"></script>
