<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="20" y="20" width="160" height="160" rx="30" ry="30" fill="url(#bg)"/>
  <!-- Play triangle -->
  <polygon points="78,60 78,140 145,100" fill="white" opacity="0.95"/>
  <!-- Subtle text indicator bars -->
  <rect x="58" y="155" width="30" height="4" rx="2" fill="white" opacity="0.5"/>
  <rect x="92" y="155" width="50" height="4" rx="2" fill="white" opacity="0.35"/>
</svg>
