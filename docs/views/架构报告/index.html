<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%234f46e5'/><text x='16' y='22' font-size='18' font-family='sans-serif' font-weight='bold' fill='white' text-anchor='middle'>VL</text></svg>" type="image/svg+xml">
    <title>VideoLingo 架构分析报告</title>

    <!-- CDN Theme — Modern Minimalist (clean, professional light) -->
    <link rel="stylesheet" href="../../cdn/theme/modern-minimalist.css">

    <!-- Docs CSS @import chain — tokens + base only -->
    <link rel="stylesheet" href="../../styles/tokens.css">
    <link rel="stylesheet" href="../../styles/base.css">

    <!-- Report-specific layout styles -->
    <link rel="stylesheet" href="index.css">

    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body class="vl-doc">

<template id="arch-report-template">
<article class="report--arch">

<!-- ═══════════════ HEADER ═══════════════ -->
<header class="report-header">
    <h1>🏗️ {{ header.title }}</h1>
    <p class="subtitle">{{ header.subtitle }}</p>
    <div class="meta">
        <span v-for="(item, i) in header.metaItems" :key="i">📅 {{ item.label }}</span>
    </div>
</header>

<!-- ═══════════════ TOC ═══════════════ -->
<nav class="toc-arch" aria-label="Table of Contents">
    <h2>📑 {{ toc.heading }}</h2>
    <ol>
        <li v-for="(item, i) in toc.items" :key="i">
            <a :href="item.href">{{ item.label }}</a>
        </li>
    </ol>
</nav>

<!-- ═══════════════ S1. 综合评分卡 ═══════════════ -->
<section id="s1">
    <h2>📊 1. {{ s1.heading }}</h2>
    <p v-html="s1.description"></p>

    <div class="score-hero">
        <div class="score-big">
            <div class="score-big__num">5.6</div>
            <div class="score-big__label">Current Score / 10</div>
        </div>
        <div class="score-bars">
            <div class="score-bar" v-for="(d, i) in s1.dimensions" :key="i">
                <span class="score-bar__label">{{ d.label }}</span>
                <span class="score-bar__track"><span :class="'score-bar__fill ' + d.cls" :style="{width: d.width}"></span></span>
                <span class="score-bar__val">{{ d.score }}</span>
            </div>
        </div>
    </div>

    <!-- Score detail table -->
    <table>
        <tr><th>Dimension</th><th>Weight</th><th>Current</th><th>Target</th><th>Gap</th><th>Key Evidence</th></tr>
        <tr><td>Layered Compliance</td><td>15%</td><td>8</td><td>9</td><td>-1</td><td>Dependency direction consistently downward, 1 minor violation (Rich progress bar in domain layer)</td></tr>
        <tr><td>Module Cohesion</td><td>15%</td><td>7</td><td>8</td><td>-1</td><td>Good file-level modularity; global path constants cause implicit coupling</td></tr>
        <tr><td>Extensibility</td><td>15%</td><td>5</td><td>8</td><td><strong>-3</strong></td><td>Adding TTS backend touches 4 files; numeric-prefix naming blocks step insertion</td></tr>
        <tr><td>Robustness</td><td>10%</td><td>7</td><td>8</td><td>-1</td><td>Checkpoint resume + retry + TTS degradation chain well covered; input validation lacking</td></tr>
        <tr><td>Testability</td><td>15%</td><td>2</td><td>7</td><td><strong>-5</strong></td><td>Zero test files; global file paths + external API coupling make mocking difficult</td></tr>
        <tr><td>Performance</td><td>10%</td><td>6</td><td>8</td><td>-2</td><td>Translation parallelism good; config/translation no caching; batch tasks serial</td></tr>
        <tr><td>Maintainability</td><td>10%</td><td>6</td><td>8</td><td>-2</td><td>Comments adequate; no test safety net; numeric-prefix naming reduces readability</td></tr>
        <tr><td>Security</td><td>10%</td><td>4</td><td>7</td><td>-3</td><td>API Key plaintext in YAML; no env var fallback; no authentication layer</td></tr>
    </table>

    <div class="gauges">
        <div class="gauge" v-for="(g, i) in s1.gauges" :key="i">
            <div :class="'gauge__ring ' + g.cls">{{ g.val }}</div>
            <div class="gauge__label">{{ g.label }}</div>
            <div class="gauge__note">{{ g.note }}</div>
        </div>
    </div>
</section>

<!-- ═══════════════ S2. KPI 仪表盘 ═══════════════ -->
<section id="s2">
    <h2>📈 2. {{ s2.heading }}</h2>
    <p>{{ s2.description }}</p>
    <div class="gauges" style="grid-template-columns:repeat(auto-fit,minmax(130px,1fr))">
        <div class="gauge" v-for="(g, i) in s2.gauges" :key="i">
            <div :class="'gauge__ring ' + g.cls">{{ g.val }}</div>
            <div class="gauge__label">{{ g.label }}</div>
            <div class="gauge__note">{{ g.note }}</div>
        </div>
    </div>
</section>

<!-- ═══════════════ S3. 背景与评估目标 ═══════════════ -->
<section id="s3">
    <h2>📋 3. {{ s3.heading }}</h2>

    <h3>{{ s3.introTitle }}</h3>
    <p v-html="s3.introText"></p>

    <h3>{{ s3.triggerTitle }}</h3>
    <table>
        <tr><th>#</th><th>Factor</th><th>Symptom</th></tr>
        <tr><td>1</td><td>Feature Bloat</td><td>Pipeline 5→15 steps, TTS 2→8 backends, modules growing without architectural governance</td></tr>
        <tr><td>2</td><td>Community Growth</td><td>New contributors need ~4h to understand codebase, lacking architectural documentation guidance</td></tr>
        <tr><td>3</td><td>Maintenance Bottleneck</td><td>Adding TTS backend changes 4 files; inserting pipeline step renames all subsequent modules</td></tr>
        <tr><td>4</td><td>Quality Risk</td><td>Zero test coverage, refactoring relies entirely on manual end-to-end verification</td></tr>
        <tr><td>5</td><td>Evolution Needs</td><td>Planning CLI / REST API / multi-task concurrency; current architecture needs moderate refactoring</td></tr>
    </table>

    <h3>{{ s3.goalsTitle }}</h3>
    <table>
        <tr><th>ID</th><th>Goal</th><th>Measurement</th><th>Current → Target</th></tr>
        <tr><td>G1</td><td>Reduce new feature integration cost</td><td>Files changed to add TTS backend</td><td>4 → <strong>1</strong></td></tr>
        <tr><td>G2</td><td>Establish regression safety net</td><td>Core module test coverage</td><td>0% → <strong>≥60%</strong></td></tr>
        <tr><td>G3</td><td>Support multi-task concurrency</td><td>Simultaneously processed videos</td><td>1 → <strong>≥4</strong></td></tr>
        <tr><td>G4</td><td>Improve code readability</td><td>New contributor onboarding time</td><td>~4h → <strong>~1h</strong></td></tr>
        <tr><td>G5</td><td>Eliminate high-frequency bottlenecks</td><td>Config/translation lookup time</td><td>Per-call I/O → <strong>Cache hit ≥90%</strong></td></tr>
    </table>
</section>

<!-- ═══════════════ S4. 架构现状总览 ═══════════════ -->
<section id="s4">
    <h2>🔍 4. {{ s4.heading }}</h2>

    <div class="metrics">
        <div class="metric"><div class="metric__value">8,787</div><div class="metric__label">Python LOC</div></div>
        <div class="metric"><div class="metric__value">52</div><div class="metric__label">.py files</div></div>
        <div class="metric"><div class="metric__value">15</div><div class="metric__label">Pipeline steps</div></div>
        <div class="metric"><div class="metric__value">8</div><div class="metric__label">TTS backends</div></div>

└──────────────────────────────────────────────────────────────┘</pre></div>

        <tr><th>Layer</th><th>Selection</th><th>Version</th><th>Role</th></tr>

        <tr><td>🧠 LLM</td><td>OpenAI SDK</td><td>≥1.55.3</td><td>Unified LLM gateway (DeepSeek/OpenAI/火山)</td></tr>

        <tr><td>🎬 Video</td><td>moviepy+ffmpeg</td><td>1.0.3</td><td>Subtitle embedding, audio/video mixing</td></tr>
        <tr><td>🌐 Docs</td><td>Vue 3 CDN</td><td>3.x</td><td>18-component documentation site</td></tr>
        <tr><td>📥 Download</td><td>yt-dlp</td><td>latest</td><td>YouTube/multi-platform</td></tr>
        <tr><td>⚙️ Config</td><td>ruamel.yaml</td><td>—</td><td>YAML read/write (thread-safe + comment preservation)</td></tr>
    </table>
</section>

<section id="s10">
    <h2>💡 10. {{ s10.heading }}</h2>

    <h3>Plan 1: Config/Translation Cache Layer <span class="badge badge-bad">P0</span></h3>
    <div class="code-block"><pre>
<span style="color:#546e7a;font-style:italic"># config_utils.py — mtime-driven smart cache</span>
_config_cache = <span style="color:#c792ea">None</span>; _cache_mtime = 0; _CACHE_TTL = 2.0

<span style="color:#c792ea">def</span> <span style="color:#82aaff">load_key</span>(key):
    <span style="color:#c792ea">global</span> _config_cache, _cache_mtime
    <span style="color:#c792ea">with</span> _lock:
        mtime = os.path.getmtime(CONFIG_PATH)
        <span style="color:#c792ea">if</span> _config_cache <span style="color:#c792ea">is</span> <span style="color:#c792ea">None</span> <span style="color:#c792ea">or</span> \
           (time.time() - _cache_mtime > _CACHE_TTL <span style="color:#c792ea">and</span> mtime != _cache_mtime):
            <span style="color:#c792ea">with</span> open(CONFIG_PATH) <span style="color:#c792ea">as</span> f: _config_cache = yaml.load(f)
            _cache_mtime = mtime
    <span style="color:#c792ea">return</span> _config_cache[key]

<span style="color:#c792ea">def</span> <span style="color:#82aaff">update_key</span>(key, v):          <span style="color:#546e7a;font-style:italic">// clear cache on write</span>
    <span style="color:#c792ea">global</span> _config_cache; _config_cache = <span style="color:#c792ea">None</span>; ...</pre></div>

    <h3>Plan 2: TTS Registry <span class="badge badge-warn">P1</span></h3>
    <div class="code-block"><pre>
<span style="color:#546e7a;font-style:italic"># tts_backend/registry.py (new)</span>
TTS_REGISTRY = {}
<span style="color:#c792ea">def</span> <span style="color:#82aaff">register</span>(name): <span style="color:#546e7a;font-style:italic"># decorator registration</span>
    <span style="color:#c792ea">def</span> <span style="color:#82aaff">d</span>(fn): TTS_REGISTRY[name] = fn; <span style="color:#c792ea">return</span> fn
    <span style="color:#c792ea">return</span> d

<span style="color:#546e7a;font-style:italic"># each backend file — self-registering (no tts_main.py change)</span>
<span style="color:#c792ea">@register</span>(<span style="color:#c3e88d">"azure_tts"</span>)
<span style="color:#c792ea">def</span> <span style="color:#82aaff">generate</span>(text, save_as, **kwargs): ...

<span style="color:#546e7a;font-style:italic"># tts_main.py — one line call</span>
TTS_REGISTRY[load_key(<span style="color:#c3e88d">"tts_method"</span>)](text, save_as, **extra)</pre></div>

    <h3>Plan 3: Workspace Task Isolation <span class="badge badge-warn">P1</span></h3>
    <div class="code-block"><pre>
<span style="color:#c792ea">@dataclass</span>
<span style="color:#c792ea">class</span> <span style="color:#ffcb6b">Workspace</span>:
    task_id: str = uuid.uuid4().hex[:8]
    root: Path = Path(<span style="color:#c3e88d">"output"</span>)
    <span style="color:#c792ea">def</span> <span style="color:#82aaff">path_for</span>(self, step): <span style="color:#c792ea">return</span> self.root / PATTERN[step]

    <span style="color:#c792ea">@staticmethod</span>
    <span style="color:#c792ea">def</span> <span style="color:#82aaff">default</span>(): <span style="color:#546e7a;font-style:italic"># backward compatible: output/ path</span>
        <span style="color:#c792ea">return</span> Workspace(task_id=<span style="color:#c3e88d">"default"</span>, root=Path(<span style="color:#c3e88d">"output"</span>))</pre></div>

    <h3>Plan 4: Pipeline Orchestration Extraction <span class="badge badge-ok">P2</span></h3>
    <div class="code-block"><pre>
<span style="color:#c792ea">class</span> <span style="color:#ffcb6b">Pipeline</span>:
    steps: List[Step]
    <span style="color:#c792ea">def</span> <span style="color:#82aaff">text_pipeline</span>(ws) → Pipeline: ...  <span style="color:#546e7a;font-style:italic">// standard text phase steps</span>
    <span style="color:#c792ea">def</span> <span style="color:#82aaff">audio_pipeline</span>(ws) → Pipeline: ... <span style="color:#546e7a;font-style:italic">// standard audio phase steps</span>
    <span style="color:#546e7a;font-style:italic">// st.py / CLI / API can all consume the same Pipeline</span></pre></div>
</section>
