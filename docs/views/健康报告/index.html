<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%234f46e5'/><text x='16' y='22' font-size='18' font-family='sans-serif' font-weight='bold' fill='white' text-anchor='middle'>VL</text></svg>" type="image/svg+xml">
    <title>VideoLingo 代码健康报告</title>

    <!-- CDN Theme — Tech Innovation (dark, bold, modern) -->
    <link rel="stylesheet" href="../../cdn/theme/tech-innovation.css">

    <!-- Docs CSS @import chain — tokens + base only (no sidebar layout for views) -->
    <link rel="stylesheet" href="../../styles/tokens.css">
    <link rel="stylesheet" href="../../styles/base.css">

    <!-- Report-specific layout styles -->
    <link rel="stylesheet" href="index.css">

    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body class="vl-doc">

<template id="health-report-template">
<div class="report report--health">
    <!-- ═══════════════ COVER ═══════════════ -->
    <div class="cover">
        <div class="cover-tag">{{ cover.tag }}</div>
        <h1>{{ cover.title }}</h1>
        <p class="cover-subtitle">{{ cover.subtitle }}</p>
        <div class="cover-meta-grid">
            <div class="cover-meta-item" v-for="(item, i) in cover.metaItems" :key="i">
                <div class="cover-meta-num">{{ item.num }}</div>
                <div class="cover-meta-label">{{ item.label }}</div>
            </div>
        </div>
    </div>

    <!-- ═══════════════ TOC ═══════════════ -->
    <nav class="toc" aria-label="Table of Contents">
        <h3>{{ toc.heading }}</h3>
        <ol>
            <li v-for="(item, i) in toc.items" :key="i">
                <a :href="item.href">{{ item.label }}</a>
            </li>
        </ol>
    </nav>

    <!-- ═══════════════ §1 COMPREHENSIVE SCORE ═══════════════ -->
    <section class="section" id="sec1">
        <h2><span class="section-num">{{ sec1.num }}</span> {{ sec1.heading }}</h2>

        <!-- Score Panel -->
        <div class="score-panel">
            <div class="score-big-grade">{{ sec1.score.grade }}</div>
            <div class="score-info">
                <h3>Comprehensive Code Health Index: {{ sec1.score.score }}</h3>
                <p v-html="sec1.score.description"></p>
                <div class="score-meta">
                    <div v-for="(item, i) in sec1.score.metaItems" :key="i">
                        <div class="score-meta-val" :style="{color: item.valColor}">{{ item.val }}</div>
                        <div class="score-meta-lbl">{{ item.lbl }}</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Seven-Dimension Score Cards -->
        <h3>1.1 Seven-Dimension Score Card</h3>
        <div class="dim-scores">
            <div class="dim-score" v-for="(d, i) in sec1.dimensionCards" :key="i">
                <div class="ds-name">{{ d.name }}</div>
                <div class="ds-grade" :style="{color: d.color}">{{ d.grade }}</div>
                <div class="ds-num">{{ d.score }} / 100</div>
            </div>
        </div>

        <!-- Methodology Table -->
        <h3>{{ sec1.methodologyTitle }}</h3>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>Dimension</th><th>Weight</th><th>Core Sub-Indicators</th><th>Detection Method</th></tr>
                </thead>
                <tbody>
                    <tr><td>D1 File Size &amp; Structure</td><td>15%</td><td>File line distribution, oversized file ratio, module SRP</td><td>AST + Manual</td></tr>
                    <tr><td>D2 Code Duplication</td><td>15%</td><td>Duplicate block count, DRY violation types, missing shared modules</td><td>Pattern Matching</td></tr>
                    <tr><td>D3 Naming Semantics</td><td>12%</td><td>Single-char variable density, vague name ratio, good naming ratio</td><td>Regex + Manual</td></tr>
                    <tr><td>D4 Nesting &amp; Cyclomatic Complexity</td><td>15%</td><td>Max nesting level, high-complexity function ratio</td><td>AST Traversal</td></tr>
                    <tr><td>D5 Function Length &amp; Responsibility</td><td>13%</td><td>Long function count, excess multiplier, SRP adherence</td><td>AST</td></tr>
                    <tr><td>D6 Comments &amp; Documentation</td><td>12%</td><td>Comment rate, docstring coverage, zero-comment file ratio</td><td>AST + Manual</td></tr>
                    <tr><td>D7 Import Standards &amp; Module Coupling</td><td>18%</td><td>Star import usage rate, core module dependency count</td><td>Regex + Dep Graph</td></tr>
                </tbody>
            </table>
        </div>
        <p style="font-size:0.82em;color:var(--vl-doc-text-muted);margin-top:6px;" v-html="sec1.methodologyNote"></p>

        <!-- SVG Radar Chart -->
        <div class="full-chart">
            <h4>{{ sec1.radarTitle }}</h4>
            <svg width="560" height="400" viewBox="0 0 560 400">
                <defs>

                <g transform="translate(280,200)">

                </g>

        </div>

                </svg>
            </div>
            <!-- Heat Map -->
            <div class="chart-card">
                <h4>{{ sec1.heatTitle }}</h4>
                <svg width="460" height="240" viewBox="0 0 460 240">
                    <defs>
                        <linearGradient id="heatGrad" x1="0" y1="0" x2="1" y2="0">

    <!-- ═══════════════ §2 D1: FILE SIZE ═══════════════ -->
    <section class="section" id="sec2">
        <h2><span class="section-num">2</span> {{ dimLabels.d1.name }} <span :class="'badge ' + dimLabels.d1.badgeStyle">{{ dimLabels.d1.score }}</span></h2>

        <h3>Score</h3>
        <div class="table-wrap">
            <table>
                <tr><th>Sub-Indicator</th><th>Weight</th><th>Measured</th><th>Target</th><th>Score</th></tr>
                <tr><td>Average file lines</td><td>25%</td><td>111 lines</td><td>&lt; 200</td><td><span class="badge badge-medium">85</span></td></tr>
                <tr><td>Oversized files (&gt;250 lines) ratio</td><td>30%</td><td>11.1% (7/63)</td><td>&lt; 5%</td><td><span class="badge badge-high">20</span></td></tr>
                <tr><td>Max file lines</td><td>15%</td><td>365 lines</td><td>&lt; 300</td><td><span class="badge badge-high">25</span></td></tr>
                <tr><td>Multi-responsibility files</td><td>20%</td><td>3 files</td><td>0</td><td><span class="badge badge-high">30</span></td></tr>
                <tr><td>Data file format appropriateness</td><td>10%</td><td>prompts.py 364 lines .py</td><td>YAML/JSON</td><td><span class="badge badge-high">20</span></td></tr>
                <tr style="font-weight:600;"><td colspan="3">Weighted Total</td><td></td><td><span class="badge badge-high">40 D</span></td></tr>
            </table>
        </div>

        <h3>Analysis</h3>
        <p>Average file size is reasonable (111 lines), but there is a severe <strong>long-tail problem</strong>: 3 of the top 4 largest files are UI files, indicating Streamlit UI is coupled with business logic. prompts.py (364 lines) should not be a .py file — it's pure data and should use YAML.</p>
        <div class="callout callout-warning">
            <strong>Core Problem:</strong> UI files take on too many functional domains. sidebar_setting.py's single function page_setting() contains LLM config + ASR selection + TTS settings + subtitle styles + audio params — 5 completely different concerns crammed together.
        </div>

        <div class="full-chart">

                <rect x="220" y="33" width="44" height="184" fill="#f85149" rx="3" opacity="0.85"/>

                <rect x="420" y="80" width="44" height="136" fill="#d29922" rx="3"/>
                <rect x="470" y="99" width="44" height="117" fill="#d29922" rx="3"/>
                <rect x="520" y="84" width="44" height="132" fill="#d29922" rx="3"/>
                <rect x="570" y="104" width="44" height="112" fill="#d29922" rx="3"/>
                <rect x="620" y="105" width="44" height="111" fill="#d29922" rx="3"/>

                <g fill="#8b949e" font-size="8" text-anchor="middle">
                    <text x="242" y="28" fill="#f85149">365</text>
                    <text x="292" y="28" fill="#f85149">364</text>

                    <text x="342" y="275" transform="rotate(-35,342,275)" font-size="8">_1_ytdlp</text>

                    <text x="592" y="275" transform="rotate(-35,592,275)" font-size="8">setup_env</text>

                <text x="685" y="95" fill="#f85149" font-size="9">250 line limit</text>
            </svg>
        </div>

        <h3>Good/Bad Comparison</h3>
        <div class="compare">
            <div class="compare-bad">
                <div class="compare-label">Bad: God-object UI file (365 lines)</div>
                <pre><code># sidebar_setting.py
def page_setting():  # 302 lines!
    # LLM + ASR + TTS + subtitles + audio...
    # All crammed in one function</code></pre>
            </div>
            <div class="compare-good">
                <div class="compare-label">Good: Split by functional domain</div>
                <pre><code># settings/llm_panel.py (~50 lines)
# settings/asr_panel.py (~45 lines)
# settings/tts_panel.py (~60 lines)
# settings/subtitle_panel.py (~40 lines)
# Independently testable, independently modifiable</code></pre>
            </div>
        </div>

        <div class="table-wrap">
            <table>
                <tr><th>ID</th><th>Action Item</th><th>Priority</th><th>Hours</th></tr>
                <tr><td>A1.1</td><td>Split page_setting() into 5 independent panel files</td><td><span class="badge badge-critical">P0</span></td><td>4h</td></tr>
                <tr><td>A1.2</td><td>prompts.py → config/prompts.yaml</td><td><span class="badge badge-high">P2</span></td><td>2h</td></tr>
            </table>
        </div>
    </section>

    <!-- ═══════════════ §3 D2: DUPLICATION ═══════════════ -->
    <section class="section" id="sec3">
        <h2><span class="section-num">3</span> {{ dimLabels.d2.name }} <span :class="'badge ' + dimLabels.d2.badgeStyle">{{ dimLabels.d2.score }}</span></h2>

        <h3>Score</h3>
