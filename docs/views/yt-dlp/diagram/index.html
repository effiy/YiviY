<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yt-dlp Download Pipeline · VideoLingo</title>
    <meta name="description" content="yt-dlp download pipeline architecture diagram — YouTube URL to VideoLingo output artifacts, with format selection, subtitle extraction, and progress hooks.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23fbbf24'/><text x='16' y='22' font-size='18' font-family='monospace' font-weight='bold' fill='%23020617' text-anchor='middle'>YT</text></svg>" type="image/svg+xml">

    <!-- CDN Theme (dark, tech-oriented) — one line to switch themes -->
    <link rel="stylesheet" href="../../../cdn/theme/tech-innovation.css">

    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

    <!-- Export: html2canvas + jsPDF -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>

    <!-- Page-specific styles (loaded manually — views are not in _COMPONENTS_WITH_CSS whitelist) -->
    <link rel="stylesheet" href="index.css">
</head>
<body class="vl-doc">

<!-- ═══════════════════════════════════════════════════════════════════
     Vue 3 Template
     ═══════════════════════════════════════════════════════════════════ -->
<template id="diagram-template">
<div class="diagram-page">
    <!-- ── Header ──────────────────────────────────────────── -->
    <div class="diagram-header">
        <div class="diagram-header-row">
            <div class="pulse-dot"></div>
            <h1>{{ title }}</h1>

            <!-- Language Toggle -->
            <button class="lang-toggle" @click="switchLang" :title="switchLangHint">
                {{ currentLang === 'en' ? '中' : 'EN' }}
            </button>

            <!-- Export Toolbar -->
            <div class="toolbar" :class="{ expanded: toolbarExpanded }">
                <div class="toolbar-actions">
                    <button @click="copyAsImage">{{ exportStatus.copy || copyPng }}</button>
                    <button @click="downloadPNG">{{ exportStatus.png || downloadPng }}</button>
                    <button @click="downloadPDF">{{ exportStatus.pdf || downloadPdf }}</button>
                </div>
                <button class="toolbar-toggle" @click="toolbarExpanded = !toolbarExpanded"
                        :title="exportOptions" aria-label="Export options">⋯</button>
            </div>
        </div>
        <p class="diagram-subtitle">{{ subtitle }}</p>
    </div>

    <!-- ── SVG Diagram ─────────────────────────────────────── -->
    <div class="diagram-container" ref="diagramContainer">
        <svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
                </marker>
                <marker id="arrowhead-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24" />
                </marker>
                <marker id="arrowhead-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#34d399" />
                </marker>
                <marker id="arrowhead-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa" />
                </marker>
                <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
                </pattern>
            </defs>

            <!-- Background Grid -->
            <rect width="100%" height="100%" fill="url(#grid)" />

            <!-- ============================================================
                 ARROWS — drawn before component boxes for correct z-order
                 ============================================================ -->

            <!-- YouTube → Streamlit UI -->
            <line x1="190" y1="95" x2="256" y2="95" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowhead-amber)"/>
            <text x="223" y="89" fill="#94a3b8" font-size="9" text-anchor="middle">{{ svg.arrows.url }}</text>

            <!-- Streamlit UI → yt-dlp Engine -->
            <line x1="510" y1="125" x2="568" y2="125" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
            <text x="539" y="118" fill="#94a3b8" font-size="8" text-anchor="middle">{{ svg.arrows.invoke }}</text>

            <!-- yt-dlp Engine ↔ ydl_opts (bidirectional) -->
            <line x1="770" y1="155" x2="788" y2="155" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>

            <!-- yt-dlp Engine → Output Region -->
            <line x1="670" y1="225" x2="670" y2="256" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowhead-emerald)"/>

            <!-- Output → Downstream Pipeline -->
            <line x1="385" y1="390" x2="385" y2="416" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowhead-violet)"/>

            <!-- Pipeline step arrows -->
            <line x1="405" y1="470" x2="418" y2="470" stroke="#34d399" stroke-width="1" marker-end="url(#arrowhead-emerald)"/>
            <line x1="515" y1="470" x2="528" y2="470" stroke="#34d399" stroke-width="1" marker-end="url(#arrowhead-emerald)"/>
            <line x1="625" y1="470" x2="638" y2="470" stroke="#34d399" stroke-width="1" marker-end="url(#arrowhead-emerald)"/>
            <line x1="735" y1="470" x2="748" y2="470" stroke="#34d399" stroke-width="1" marker-end="url(#arrowhead-emerald)"/>

            <!-- ============================================================
                 REGION BOUNDARIES
                 ============================================================ -->

            <!-- YouTube Region — amber / Cloud Service -->
            <rect x="20" y="30" width="200" height="160" rx="12" fill="rgba(251, 191, 36, 0.04)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="8,4"/>
            <text x="32" y="48" fill="#fbbf24" font-size="10" font-weight="600">{{ svg.regions.youtube }}</text>

            <!-- VideoLingo Application Region — cyan / Frontend -->
            <rect x="260" y="30" width="720" height="640" rx="12" fill="rgba(34, 211, 238, 0.03)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="8,4"/>
            <text x="272" y="48" fill="#22d3ee" font-size="10" font-weight="600">{{ svg.regions.videoLingo }}</text>

            <!-- Output Artifacts Region — violet / Data -->
            <rect x="290" y="260" width="670" height="130" rx="12" fill="rgba(167, 139, 250, 0.04)" stroke="#a78bfa" stroke-width="1" stroke-dasharray="8,4"/>
            <text x="302" y="278" fill="#a78bfa" font-size="10" font-weight="600">{{ svg.regions.output }}</text>

            <!-- Downstream Pipeline Region — emerald / Backend -->
            <rect x="290" y="420" width="670" height="130" rx="12" fill="rgba(6, 78, 59, 0.04)" stroke="#34d399" stroke-width="1" stroke-dasharray="8,4"/>
            <text x="302" y="438" fill="#34d399" font-size="10" font-weight="600">{{ svg.regions.pipeline }}</text>

            <!-- ============================================================
                 COMPONENT BOXES — opaque #0f172a mask behind each
                 ============================================================ -->

            <!-- ── YouTube URL — Cloud Service / amber ── -->
            <rect x="50" y="70" width="140" height="50" rx="6" fill="#0f172a"/>
            <rect x="50" y="70" width="140" height="50" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
            <text x="120" y="90" fill="white" font-size="11" font-weight="600" text-anchor="middle">{{ svg.youtube.title }}</text>
            <text x="120" y="108" fill="#94a3b8" font-size="9" text-anchor="middle">{{ svg.youtube.desc }}</text>

            <!-- Cookie auth badge — Message Bus / orange -->
            <rect x="60" y="135" width="120" height="20" rx="4" fill="#0f172a"/>
            <rect x="60" y="135" width="120" height="20" rx="4" fill="rgba(251, 146, 60, 0.25)" stroke="#fb923c" stroke-width="1"/>
            <text x="120" y="149" fill="#fb923c" font-size="8" text-anchor="middle">{{ svg.cookie.text }}</text>

            <!-- ── Streamlit UI — Frontend / cyan ── -->
            <rect x="290" y="70" width="220" height="110" rx="8" fill="#0f172a"/>
            <rect x="290" y="70" width="220" height="110" rx="8" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
            <text x="400" y="92" fill="white" font-size="11" font-weight="600" text-anchor="middle">{{ svg.streamlit.title }}</text>
            <text x="400" y="108" fill="#94a3b8" font-size="8" text-anchor="middle">{{ svg.streamlit.file }}</text>
            <text x="400" y="122" fill="#94a3b8" font-size="8" text-anchor="middle">{{ svg.streamlit.input }}</text>
            <text x="400" y="138" fill="#94a3b8" font-size="8" text-anchor="middle">{{ svg.streamlit.preview }}</text>
            <text x="400" y="158" fill="#22d3ee" font-size="8" text-anchor="middle">{{ svg.streamlit.res }}</text>
            <text x="400" y="172" fill="#94a3b8" font-size="7" text-anchor="middle">{{ svg.streamlit.advanced }}</text>

            <!-- ── yt-dlp Engine — Backend / emerald ── -->
            <rect x="570" y="70" width="200" height="110" rx="8" fill="#0f172a"/>
            <rect x="570" y="70" width="200" height="110" rx="8" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
            <text x="670" y="92" fill="white" font-size="11" font-weight="600" text-anchor="middle">{{ svg.engine.title }}</text>
            <text x="670" y="108" fill="#94a3b8" font-size="8" text-anchor="middle">{{ svg.engine.file }}</text>
            <text x="670" y="124" fill="#94a3b8" font-size="8" text-anchor="middle">{{ svg.engine.cache }}</text>
            <text x="670" y="140" fill="#94a3b8" font-size="8" text-anchor="middle">{{ svg.engine.update }}</text>
            <text x="670" y="158" fill="#34d399" font-size="8" text-anchor="middle">{{ svg.engine.format }}</text>
            <text x="670" y="172" fill="#34d399" font-size="7" text-anchor="middle">{{ svg.engine.concurrency }}</text>

            <!-- ── ydl_opts — External/Config / slate ── -->
            <rect x="790" y="70" width="170" height="170" rx="8" fill="#0f172a"/>
            <rect x="790" y="70" width="170" height="170" rx="8" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
            <text x="875" y="90" fill="white" font-size="10" font-weight="600" text-anchor="middle">{{ svg.ydlOpts.title }}</text>
            <text v-for="(item, i) in svg.ydlOpts.items" :key="i"
                  x="875" :y="108 + i * 14" fill="#94a3b8" font-size="8" text-anchor="middle">{{ item }}</text>

            <!-- ── Progress Hook — Message Bus / orange ── -->
            <rect x="570" y="195" width="200" height="30" rx="4" fill="#0f172a"/>
            <rect x="570" y="195" width="200" height="30" rx="4" fill="rgba(251, 146, 60, 0.25)" stroke="#fb923c" stroke-width="1"/>
            <text x="670" y="214" fill="#fb923c" font-size="8" text-anchor="middle">{{ svg.progressHook.text }}</text>

            <!-- ── Output: video.mp4 — Data / violet ── -->
            <rect x="310" y="295" width="150" height="55" rx="6" fill="#0f172a"/>
            <rect x="310" y="295" width="150" height="55" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
            <text x="385" y="316" fill="white" font-size="10" font-weight="600" text-anchor="middle">{{ svg.outputs.video.title }}</text>
            <text x="385" y="332" fill="#94a3b8" font-size="8" text-anchor="middle">{{ svg.outputs.video.desc1 }}</text>
            <text x="385" y="344" fill="#a78bfa" font-size="7" text-anchor="middle">{{ svg.outputs.video.desc2 }}</text>

            <!-- ── Output: thumbnail.jpg — Data / violet ── -->
            <rect x="480" y="295" width="140" height="55" rx="6" fill="#0f172a"/>
            <rect x="480" y="295" width="140" height="55" rx="6" fill="rgba(76, 29, 149, 0.3)" stroke="#a78bfa" stroke-width="1.5"/>
            <text x="550" y="316" fill="white" font-size="10" font-weight="600" text-anchor="middle">{{ svg.outputs.thumbnail.title }}</text>
            <text x="550" y="332" fill="#94a3b8" font-size="8" text-anchor="middle">{{ svg.outputs.thumbnail.desc1 }}</text>
            <text x="550" y="344" fill="#a78bfa" font-size="7" text-anchor="middle">{{ svg.outputs.thumbnail.desc2 }}</text>

            <!-- ── Output: subtitles.vtt — Data / violet ── -->
            <rect x="640" y="295" width="140" height="55" rx="6" fill="#0f172a"/>
            <rect x="640" y="295" width="140" height="55" rx="6" fill="rgba(76, 29, 149, 0.3)" stroke="#a78bfa" stroke-width="1.5"/>
            <text x="710" y="316" fill="white" font-size="10" font-weight="600" text-anchor="middle">{{ svg.outputs.subtitles.title }}</text>
            <text x="710" y="332" fill="#94a3b8" font-size="8" text-anchor="middle">{{ svg.outputs.subtitles.desc1 }}</text>
            <text x="710" y="344" fill="#a78bfa" font-size="7" text-anchor="middle">{{ svg.outputs.subtitles.desc2 }}</text>

            <!-- ── Output: audio.m4a — Data / violet ── -->
            <rect x="800" y="295" width="140" height="55" rx="6" fill="#0f172a"/>
            <rect x="800" y="295" width="140" height="55" rx="6" fill="rgba(76, 29, 149, 0.3)" stroke="#a78bfa" stroke-width="1.5"/>
            <text x="870" y="316" fill="white" font-size="10" font-weight="600" text-anchor="middle">{{ svg.outputs.audio.title }}</text>
            <text x="870" y="332" fill="#94a3b8" font-size="8" text-anchor="middle">{{ svg.outputs.audio.desc1 }}</text>
            <text x="870" y="344" fill="#a78bfa" font-size="7" text-anchor="middle">{{ svg.outputs.audio.desc2 }}</text>

            <!-- ── Metadata bar — External / slate ── -->
            <rect x="310" y="360" width="630" height="22" rx="4" fill="#0f172a"/>
            <rect x="310" y="360" width="630" height="22" rx="4" fill="rgba(30, 41, 59, 0.5)" stroke="#475569" stroke-width="1"/>
            <text x="625" y="375" fill="#94a3b8" font-size="8" text-anchor="middle">{{ svg.metadata.text }}</text>

            <!-- ── Pipeline Steps — Backend / emerald ── -->

            <!-- Step 2 -->
            <rect x="310" y="450" width="95" height="40" rx="6" fill="#0f172a"/>
            <rect x="310" y="450" width="95" height="40" rx="6" fill="rgba(6, 78, 59, 0.35)" stroke="#34d399" stroke-width="1.5"/>
            <text x="357" y="466" fill="white" font-size="9" font-weight="600" text-anchor="middle">{{ svg.pipeline.step2.title }}</text>
            <text x="357" y="482" fill="#94a3b8" font-size="7" text-anchor="middle">{{ svg.pipeline.step2.desc }}</text>

            <!-- Step 3 -->
            <rect x="420" y="450" width="95" height="40" rx="6" fill="#0f172a"/>
            <rect x="420" y="450" width="95" height="40" rx="6" fill="rgba(6, 78, 59, 0.35)" stroke="#34d399" stroke-width="1.5"/>
            <text x="467" y="466" fill="white" font-size="9" font-weight="600" text-anchor="middle">{{ svg.pipeline.step3.title }}</text>
            <text x="467" y="482" fill="#94a3b8" font-size="7" text-anchor="middle">{{ svg.pipeline.step3.desc }}</text>

            <!-- Step 4 -->
            <rect x="530" y="450" width="95" height="40" rx="6" fill="#0f172a"/>
            <rect x="530" y="450" width="95" height="40" rx="6" fill="rgba(6, 78, 59, 0.35)" stroke="#34d399" stroke-width="1.5"/>
            <text x="577" y="466" fill="white" font-size="9" font-weight="600" text-anchor="middle">{{ svg.pipeline.step4.title }}</text>
            <text x="577" y="482" fill="#94a3b8" font-size="7" text-anchor="middle">{{ svg.pipeline.step4.desc }}</text>

            <!-- Step 5-7 -->
            <rect x="640" y="450" width="95" height="40" rx="6" fill="#0f172a"/>
            <rect x="640" y="450" width="95" height="40" rx="6" fill="rgba(6, 78, 59, 0.35)" stroke="#34d399" stroke-width="1.5"/>
            <text x="687" y="466" fill="white" font-size="9" font-weight="600" text-anchor="middle">{{ svg.pipeline.step57.title }}</text>
            <text x="687" y="482" fill="#94a3b8" font-size="7" text-anchor="middle">{{ svg.pipeline.step57.desc }}</text>

            <!-- Step 8-12 -->
            <rect x="750" y="450" width="95" height="40" rx="6" fill="#0f172a"/>
            <rect x="750" y="450" width="95" height="40" rx="6" fill="rgba(6, 78, 59, 0.35)" stroke="#34d399" stroke-width="1.5"/>
            <text x="797" y="466" fill="white" font-size="9" font-weight="600" text-anchor="middle">{{ svg.pipeline.step812.title }}</text>
            <text x="797" y="482" fill="#94a3b8" font-size="7" text-anchor="middle">{{ svg.pipeline.step812.desc }}</text>

            <!-- ── find_video_files gateway — Frontend / cyan ── -->
            <rect x="310" y="500" width="630" height="40" rx="6" fill="#0f172a"/>
            <rect x="310" y="500" width="630" height="40" rx="6" fill="rgba(8, 51, 68, 0.3)" stroke="#22d3ee" stroke-width="1"/>
            <text x="625" y="518" fill="#22d3ee" font-size="9" font-weight="600" text-anchor="middle">{{ svg.gateway.line1 }}</text>
            <text x="625" y="534" fill="#94a3b8" font-size="7" text-anchor="middle">{{ svg.gateway.line2 }}</text>

            <!-- ============================================================
                 LEGEND — outside all boundary boxes, 20px+ below lowest
                 Lowest boundary: Pipeline y=420+130=550 → legend y=572
                 ============================================================ -->
            <text x="290" y="572" fill="white" font-size="10" font-weight="600">{{ svg.legend.title }}</text>

            <rect x="290" y="584" width="16" height="10" rx="2" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1"/>
            <text x="312" y="593" fill="#94a3b8" font-size="8">{{ svg.legend.youtube }}</text>

            <rect x="470" y="584" width="16" height="10" rx="2" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1"/>
            <text x="492" y="593" fill="#94a3b8" font-size="8">{{ svg.legend.frontend }}</text>

            <rect x="620" y="584" width="16" height="10" rx="2" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
            <text x="642" y="593" fill="#94a3b8" font-size="8">{{ svg.legend.backend }}</text>

            <rect x="790" y="584" width="16" height="10" rx="2" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1"/>
            <text x="812" y="593" fill="#94a3b8" font-size="8">{{ svg.legend.output }}</text>

            <rect x="290" y="602" width="16" height="10" rx="2" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1"/>
            <text x="312" y="611" fill="#94a3b8" font-size="8">{{ svg.legend.options }}</text>

            <rect x="470" y="602" width="16" height="10" rx="2" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1"/>
            <text x="492" y="611" fill="#94a3b8" font-size="8">{{ svg.legend.hooks }}</text>

            <rect x="620" y="602" width="16" height="10" rx="2" fill="transparent" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,4"/>
            <text x="642" y="611" fill="#94a3b8" font-size="8">{{ svg.legend.boundary }}</text>

            <!-- Tech stack row -->
            <text x="500" y="650" fill="#475569" font-size="8" text-anchor="middle">{{ svg.techStack }}</text>
        </svg>
    </div>

    <!-- ── Info Cards ──────────────────────────────────────── -->
    <div class="diagram-cards">
        <div class="diagram-card" v-for="(card, i) in cards" :key="i">
            <div class="diagram-card-header">
                <div class="card-dot" :class="card.dotClass"></div>
                <h3>{{ card.title }}</h3>
            </div>
            <ul>
                <li v-for="(item, j) in card.items" :key="j">{{ item }}</li>
            </ul>
        </div>
    </div>

    <!-- ── Footer ──────────────────────────────────────────── -->
    <p class="diagram-footer">{{ footer }}</p>
</div>
</template>

<!-- ═══════════════════════════════════════════════════════════════════
     Script Loading Order (Critical)
       data.js MUST load before index.js
       lang.js + mount-component.js provide VL_LANG + mountDocComponent()
     ═══════════════════════════════════════════════════════════════════ -->
<script src="data.js"></script>
<script src="../../../assets/lang.js"></script>
<script src="../../../assets/mount-component.js"></script>
<script src="index.js"></script>

</body>
</html>
