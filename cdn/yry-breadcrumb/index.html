<script type="text/x-template" id="yry-breadcrumb-tpl">
    <nav class="breadcrumb" :aria-label="ariaLabel">
        <template v-for="(item, idx) in items">
            <a v-if="item.href && idx < items.length - 1" :href="item.href">{{ item.label }}</a>
            <span v-else-if="!item.href && idx < items.length - 1">{{ item.label }}</span>
            <span v-if="idx < items.length - 1" class="bc-sep" aria-hidden="true">{{ separator }}</span>
            <span v-if="idx === items.length - 1" class="bc-current" aria-current="page">{{ item.label }}</span>
        </template>
    </nav>
</script>

<script src="index.js"></script>
