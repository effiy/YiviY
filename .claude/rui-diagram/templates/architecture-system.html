<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[PROJECT_NAME] — System Architecture Diagram</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="theme-bridge.css">
    <style>
        :root {
            --diag-bg:           var(--yry-bg-primary, #0b0b10);
            --diag-surface:      color-mix(in srgb, var(--yry-bg-secondary, #14141c) 85%, transparent);
            --diag-border:       var(--yry-border, #1e293b);
            --diag-grid:         color-mix(in srgb, var(--diag-border) 80%, transparent);
            --diag-text:         var(--yry-text-primary, #f8fafc);
            --diag-text-soft:    var(--yry-text-secondary, #94a3b8);
            --diag-accent:       var(--yry-accent, #22d3ee);
            --diag-layer-ui:       var(--yry-chart-1, #22d3ee);
            --diag-layer-service:  var(--yry-chart-3, #34d399);
            --diag-layer-data:     var(--yry-chart-4, #a78bfa);
            --diag-layer-infra:    var(--yry-chart-5, #fbbf24);
            --diag-layer-auth:     var(--yry-error, #fb7185);
            --diag-font:         var(--yry-font-mono, 'JetBrains Mono', monospace);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--diag-font);
            background: var(--diag-bg);
            min-height: 100vh;
            padding: 2rem;
            color: var(--diag-text);
        }

        .container { max-width: 1200px; margin: 0 auto; }
        .header    { margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem; }
        .pulse-dot { width: 12px; height: 12px; background: var(--diag-accent); border-radius: 50%; }
        h1         { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.025em; }
        .subtitle  { color: var(--diag-text-soft); font-size: 0.875rem; margin-left: auto; }

        .diagram-container {
            background: var(--diag-surface);
            border-radius: 1rem;
            border: 1px solid var(--diag-border);
            padding: 1.5rem;
            overflow-x: auto;
        }

        svg { width: 100%; min-width: 900px; display: block; }
        .node {
            fill: var(--diag-surface);
            stroke: var(--diag-border);
            stroke-width: 1.5;
        }
        .node-ui      { stroke: var(--diag-layer-ui); }
        .node-service { stroke: var(--diag-layer-service); }
        .node-data    { stroke: var(--diag-layer-data); }
        .node-infra   { stroke: var(--diag-layer-infra); }
        .node-auth    { stroke: var(--diag-layer-auth); }

        .edge        { stroke: var(--diag-border); stroke-width: 1.5; fill: none; }
        .edge-accent { stroke: var(--diag-accent); stroke-width: 2; }

        .label       { fill: var(--diag-text); font-family: var(--diag-font); font-size: 13px; }
        .label-soft  { fill: var(--diag-text-soft); font-family: var(--diag-font); font-size: 11px; }

        .legend {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
            font-size: 0.75rem;
            color: var(--diag-text-soft);
        }
        .legend-item { display: flex; align-items: center; gap: 0.375rem; }
        .legend-swatch { width: 10px; height: 10px; border-radius: 2px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="pulse-dot"></span>
            <h1>[PROJECT_NAME] — Architecture</h1>
            <span class="subtitle">v[VERSION] · [DATE]</span>
        </div>

        <div class="diagram-container">
            <svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
                <!--
                    ════════════════════════════════════════════
                    Layer Definitions (semantic classes):
                      node-ui      → user-facing layer
                      node-service → application services
                      node-data    → data stores
                      node-infra   → infrastructure
                      node-auth    → security/auth components
                    ════════════════════════════════════════════
                -->
                <g id="layer-ui">
                    <rect class="node node-ui" x="50" y="50" width="200" height="80" rx="8"/>
                    <text class="label" x="150" y="95" text-anchor="middle">[UI Component]</text>
                </g>

                <g id="layer-service">
                    <rect class="node node-service" x="350" y="50" width="200" height="80" rx="8"/>
                    <text class="label" x="450" y="95" text-anchor="middle">[Service]</text>
                </g>

                <g id="layer-data">
                    <rect class="node node-data" x="650" y="50" width="200" height="80" rx="8"/>
                    <text class="label" x="750" y="95" text-anchor="middle">[Data Store]</text>
                </g>

                <!-- Edges -->
                <path class="edge" d="M250 90 L350 90" />
                <path class="edge" d="M550 90 L650 90" />
            </svg>

            <div class="legend">
                <span class="legend-item"><span class="legend-swatch" style="background:var(--diag-layer-ui)"></span> UI</span>
                <span class="legend-item"><span class="legend-swatch" style="background:var(--diag-layer-service)"></span> Service</span>
                <span class="legend-item"><span class="legend-swatch" style="background:var(--diag-layer-data)"></span> Data</span>
                <span class="legend-item"><span class="legend-swatch" style="background:var(--diag-layer-infra)"></span> Infra</span>
                <span class="legend-item"><span class="legend-swatch" style="background:var(--diag-layer-auth)"></span> Auth</span>
            </div>
        </div>
    </div>
</body>
</html>
