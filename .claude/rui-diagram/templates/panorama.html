<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Panorama — [PROJECT_NAME]</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">

  <!-- Theme -->
  <link rel="stylesheet" href="../../cdn/theme/__THEME_NAME__.css">

  <!-- Panorama styles -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--yry-bg-primary, #020617);
      color: var(--yry-text, #e2e8f0);
      font-family: 'JetBrains Mono', 'IBM Plex Sans', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }

    /* ── Header ── */
    .panorama-header {
      width: 100%;
      max-width: 900px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.25rem;
      margin-bottom: 1rem;
      background: var(--yry-bg-card, #0f172a);
      border: 1px solid var(--yry-border-color, #1e293b);
      border-radius: 12px;
    }
    .panorama-header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .panorama-header .pulse-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--yry-accent, #22d3ee);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .header-actions { display: flex; gap: 0.5rem; }
    .btn {
      padding: 0.35rem 0.75rem;
      border: 1px solid var(--yry-border-color, #1e293b);
      border-radius: 6px;
      background: var(--yry-bg-raised, #1e293b);
      color: var(--yry-text-soft, #cbd5e1);
      font-size: 0.8rem;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn:hover { background: var(--yry-accent-soft, rgba(34,211,238,0.1)); }

    /* ── SVG viewport ── */
    .panorama-viewport {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 4/3;
      max-height: 675px;
      background: var(--yry-bg-card, #0f172a);
      border: 1px solid var(--yry-border-color, #1e293b);
      border-radius: 12px;
      overflow: hidden;
    }
    .panorama-viewport svg {
      width: 100%;
      height: 100%;
    }

    /* ── Summary Bar ── */
    .panorama-summary {
      width: 100%;
      max-width: 900px;
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      padding: 0.75rem 1.25rem;
      margin-top: 0.75rem;
      background: var(--yry-bg-card, #0f172a);
      border: 1px solid var(--yry-border-color, #1e293b);
      border-radius: 12px;
      font-size: 0.8rem;
      color: var(--yry-text-muted, #94a3b8);
    }
    .panorama-summary .stat { display: flex; align-items: center; gap: 0.35rem; }
    .panorama-summary .stat strong { color: var(--yry-text, #e2e8f0); }

    /* ── Tooltip ── */
    .node-tooltip {
      position: fixed;
      pointer-events: none;
      background: var(--yry-bg-raised, #1e293b);
      border: 1px solid var(--yry-accent, #22d3ee);
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      font-size: 0.75rem;
      max-width: 240px;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .node-tooltip.visible { opacity: 1; }
    .node-tooltip .tt-name { font-weight: 600; color: var(--yry-text, #e2e8f0); }
    .node-tooltip .tt-type { color: var(--yry-accent, #22d3ee); font-size: 0.7rem; }
    .node-tooltip .tt-summary { color: var(--yry-text-muted, #94a3b8); margin-top: 0.25rem; }

    /* ── Legend ── */
    .panorama-legend {
      width: 100%;
      max-width: 900px;
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      padding: 0.5rem 1rem;
      margin-top: 0.5rem;
      font-size: 0.7rem;
      color: var(--yry-text-muted, #94a3b8);
    }
    .panorama-legend .legend-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .panorama-legend .legend-dot {
      width: 10px; height: 10px;
      border-radius: 3px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="panorama-header">
    <h1><span class="pulse-dot"></span> System Panorama — [PROJECT_NAME]</h1>
    <div class="header-actions">
      <button class="btn" onclick="downloadPNG()" title="Download PNG (2x)">📥 PNG</button>
      <button class="btn" onclick="downloadPDF()" title="Download PDF">📄 PDF</button>
    </div>
  </div>

  <!-- SVG Viewport — 800×600 virtual coordinate space -->
  <div class="panorama-viewport" id="viewport">
    <!--
      SVG template structure:
      - viewBox="0 0 800 600"
      - Grid: 40×40 pattern
      - Layer boundaries: dashed rectangles with labels
      - Cross-layer edges: gradient arrows
      - Hub nodes: colored rectangles with name + summary
      - External nodes: dashed-border rectangles
      - Diff markers: * asterisks on changed nodes

      Layer color palette (use var(--diag-*) tokens when bridged, or inline):
      UI:         #22d3ee (Cyan)
      API:        #38bdf8 (Sky)
      Service:    #34d399 (Emerald)
      Data:       #a78bfa (Violet)
      Infra:      #fbbf24 (Amber)
      Config:     #94a3b8 (Slate)
      Auth:       #fb7185 (Rose)
      Events:     #fb923c (Orange)
      Utility:    #64748b (Slate-muted)
      External:   #475569 (Slate-dark)

      See references/diagram-system.md for full construction rules.
    -->
    <svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
      <!-- ═══════════════════════════════════ -->
      <!-- Grid                               -->
      <!-- ═══════════════════════════════════ -->
      <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
          <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
        </pattern>
        <!-- Arrow marker -->
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
        </marker>
      </defs>

      <!-- Grid background -->
      <rect width="800" height="600" fill="url(#grid)"/>

      <!-- ═══════════════════════════════════ -->
      <!-- Layer Boundaries (example)         -->
      <!-- ═══════════════════════════════════ -->
      <!-- Replace with KG-derived layers -->

      <!-- ═══════════════════════════════════ -->
      <!-- Nodes (example hub nodes)          -->
      <!-- ═══════════════════════════════════ -->
      <!-- Replace with KG-derived hub nodes -->

      <!-- ═══════════════════════════════════ -->
      <!-- Edges (cross-layer arrows)         -->
      <!-- ═══════════════════════════════════ -->
      <!-- Replace with KG-derived edges -->

      <!-- No-data placeholder -->
      <text x="400" y="300" text-anchor="middle" fill="#475569" font-size="14">
        Run rui-diagram Phase 0 to populate panorama
      </text>
      <text x="400" y="325" text-anchor="middle" fill="#334155" font-size="11">
        node .claude/rui-diagram/... --mode panorama
      </text>
    </svg>
  </div>

  <!-- Legend -->
  <div class="panorama-legend">
    <span class="legend-item"><span class="legend-dot" style="background:#22d3ee"></span> UI</span>
    <span class="legend-item"><span class="legend-dot" style="background:#38bdf8"></span> API</span>
    <span class="legend-item"><span class="legend-dot" style="background:#34d399"></span> Service</span>
    <span class="legend-item"><span class="legend-dot" style="background:#a78bfa"></span> Data</span>
    <span class="legend-item"><span class="legend-dot" style="background:#fbbf24"></span> Infra</span>
    <span class="legend-item"><span class="legend-dot" style="background:#94a3b8"></span> Config</span>
    <span class="legend-item"><span class="legend-dot" style="background:#fb7185"></span> Auth</span>
    <span class="legend-item"><span class="legend-dot" style="background:#64748b"></span> Utility</span>
  </div>

  <!-- Summary Bar -->
  <div class="panorama-summary" id="summary-bar">
    <span class="stat">Nodes: <strong id="stat-nodes">—</strong></span>
    <span class="stat">Layers: <strong id="stat-layers">—</strong></span>
    <span class="stat">Sub-projects: <strong id="stat-subs">—</strong></span>
    <span class="stat">Analyzed: <strong id="stat-date">—</strong></span>
  </div>

  <!-- Tooltip -->
  <div class="node-tooltip" id="tooltip"></div>

  <!-- Export scripts (html2canvas + jsPDF for PNG/PDF export) -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"
          integrity="sha384-..." crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"
          integrity="sha384-..." crossorigin="anonymous"></script>

  <script>
    // ── Tooltip ──
    (function() {
      var tooltip = document.getElementById('tooltip');
      var svg = document.querySelector('svg');
      if (!svg) return;

      svg.addEventListener('mouseover', function(e) {
        var node = e.target.closest('[data-node-id]');
        if (!node) { tooltip.classList.remove('visible'); return; }
        tooltip.innerHTML =
          '<div class="tt-name">' + (node.dataset.name || '') + '</div>' +
          '<div class="tt-type">' + (node.dataset.type || '') + '</div>' +
          '<div class="tt-summary">' + (node.dataset.summary || '') + '</div>';
        tooltip.classList.add('visible');
      });

      svg.addEventListener('mousemove', function(e) {
        tooltip.style.left = (e.clientX + 12) + 'px';
        tooltip.style.top = (e.clientY + 12) + 'px';
      });

      svg.addEventListener('mouseout', function(e) {
        if (!e.target.closest('[data-node-id]')) {
          tooltip.classList.remove('visible');
        }
      });
    })();

    // ── Export ──
    function downloadPNG() {
      var vp = document.getElementById('viewport');
      html2canvas(vp, { backgroundColor: '#020617', scale: 2 }).then(function(canvas) {
        var a = document.createElement('a');
        a.download = 'panorama-[PROJECT_NAME].png';
        a.href = canvas.toDataURL('image/png');
        a.click();
      });
    }

    function downloadPDF() {
      var vp = document.getElementById('viewport');
      html2canvas(vp, { backgroundColor: '#020617', scale: 2 }).then(function(canvas) {
        var imgData = canvas.toDataURL('image/png');
        var { jsPDF } = window.jspdf;
        var pdf = new jsPDF('landscape', 'px', [canvas.width, canvas.height]);
        pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);
        pdf.save('panorama-[PROJECT_NAME].pdf');
      });
    }

    // ── Summary data injection ──
    // Call updateSummary({ nodes, layers, subProjects, analyzedAt }) after SVG generation
    window.updatePanoramaSummary = function(data) {
      document.getElementById('stat-nodes').textContent = data.nodes || '—';
      document.getElementById('stat-layers').textContent = data.layers || '—';
      document.getElementById('stat-subs').textContent = data.subProjects || '—';
      document.getElementById('stat-date').textContent = data.analyzedAt || '—';
    };
  </script>
</body>
</html>
